<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone-Paper-Scissor!!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="header">
    <div id="header">
        <div class="hamburger">
            <div class="burger"></div>
            <div class="burger"></div>
            <div class="burger"></div>
            
        </div>
        <div class="panel" id="panel">
            <p id="mode">Mode</p>
            <div class="modeoption" id="modeoption">
                <p id="normal">Normal </p>
                <p id="bestof5" >Best Of 5</p>
            </div>
            <p id="reset">Reset Game</p>
        </div>
       <h1 class="heading">Stone-Paper-Scissor 🎮!!</h1>
       <a class="icon" id="soundicon"><i class="fa-solid fa-volume-high"></i></a>
      <a class="icon" id="themeicon"><i class="fa-solid fa-circle-half-stroke"></i>
       </a></div></header>
        <!-- --game-icon-section-- -->
    <div class="Choices">
        <div class="choice" id="stone">
            <img id="stone" src="images/stone.png" >
        </div>
        <div class="choice" id="paper">
            <img id="Paper" src="images/paper.png" >
        </div>
        <div class="choice" id="Scissor">
            <img id="Scissor" src="images/scissors.png" >
        </div>
    </div>
   
    <div class="score-board">
        <div class="score">
        <p id="user-score">0</p>
        <p id="P">You</p></div>
    
     <div class="score">
        <p id="comp-score">0</p>
        <p id="P">Comp</p></div>
    </div>
    <div class="msg-container">
        <p id="move">Play your Move!!</p>
    </div>
       
    <script src="js.js"></script>
</body>
</html>
